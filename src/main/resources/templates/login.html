<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — Complaint Tracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f2f5;
        }
        .auth-box {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,.10);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
        }
        .auth-logo {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: 1.8rem;
        }
        .auth-logo span { color: #4fc3f7; }
        .auth-box h2 { font-size: 1.2rem; margin-bottom: 1.4rem; color: #374151; }
        .auth-footer { text-align: center; margin-top: 1.2rem; font-size: .9rem; color: #6b7280; }
        .auth-footer a { color: #3b82f6; font-weight: 600; }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-box">
        <div class="auth-logo">🎫 Complaint <span>Tracker</span></div>
        <h2>Sign in to your account</h2>

        <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form method="post" th:action="@{/login}">
            <div class="form-group" style="margin-bottom:1rem">
                <label for="username">Username</label>
                <input id="username" name="username" type="text"
                       placeholder="Enter your username" required autofocus/>
            </div>
            <div class="form-group" style="margin-bottom:1.4rem">
                <label for="password">Password</label>
                <input id="password" name="password" type="password"
                       placeholder="Enter your password" required/>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:.7rem;">
                Sign In
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a th:href="@{/register}">Register here</a>
        </div>

        <!-- Default credentials hint -->
        <div style="margin-top:1.5rem; padding:1rem; background:#f8fafc; border-radius:8px; font-size:.82rem; color:#6b7280;">
            <strong>Default accounts:</strong><br/>
            👑 Admin — <code>admin</code> / <code>admin123</code><br/>
            👤 User &nbsp;— <code>user</code> / <code>user123</code>
        </div>
    </div>
</div>
</body>
</html>
